name: Toshani CICD Pipeline

on:
  push:
    branches:
      - develop

  workflow_dispatch:
    inputs:
      service:
        description: Select service to deploy (optional)
        required: false
        type: choice
        options:
          - eureka-client
          - auth-service
          - gateway-service
          - setting-service
          - user-service

jobs:

  # =========================
  # BUILD JOB
  # =========================
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build All Modules
        run: |
          cd parent-pom
          mvn clean install -DskipTests

      - name: Collect JARs
        run: |
          mkdir artifacts
          cp auth-service/target/*.jar artifacts/ || true
          cp eureka-client/target/*.jar artifacts/ || true
          cp gateway-service/target/*.jar artifacts/ || true
          cp setting-service/target/*.jar artifacts/ || true
          cp user-service/target/*.jar artifacts/ || true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jars
          path: artifacts/*.jar


  # =========================
  # DEPLOY JOB
  # =========================
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: jars
          path: artifacts

      - name: Upload JARs to EC2 (tmp)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: artifacts/*.jar
          target: /tmp/deploy/

      - name: Copy and Restart Services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            echo "🚀 Starting Deployment"

            TMP="/tmp/deploy/artifacts"
            BASE="/var/www/toshanidev"

            # Copy jars to respective service folders
            cp $TMP/auth-service*.jar $BASE/auth-service/ 2>/dev/null || true
            cp $TMP/user-service*.jar $BASE/user-service/ 2>/dev/null || true
            cp $TMP/gateway-service*.jar $BASE/gateway-service/ 2>/dev/null || true
            cp $TMP/setting-service*.jar $BASE/setting-service/ 2>/dev/null || true
            cp $TMP/eureka-client*.jar $BASE/eureka-client/ 2>/dev/null || true

            echo "📂 Files after copy:"
            ls -R $BASE

            # Restart all services
            pm2 restart all

            echo "🔄 PM2 restarted all services"

            # Clean temp files
            rm -f $TMP/*.jar

            echo "✅ Deployment completed successfully"
