name: Toshani CICD Pipeline

on:
  push:
    branches:
      - develop

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # CHECKOUT
      # =========================
      - name: Checkout Code
        uses: actions/checkout@v4

      # =========================
      # JAVA SETUP
      # =========================
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # =========================
      # BUILD USING PARENT POM
      # =========================
      - name: Build All Modules (Parent POM)
        run: |
          cd parent-pom
          mvn clean install -DskipTests

      # =========================
      # COLLECT ONLY SERVICE JARS
      # =========================
      - name: Collect Service JARs
        run: |
          mkdir jars
          cp auth-service/target/*.jar jars/ || true
          cp eureka-client/target/*.jar jars/ || true
          cp gateway-service/target/*.jar jars/ || true
          cp setting-service/target/*.jar jars/ || true
          cp user-service/target/*.jar jars/ || true

      # =========================
      # COPY TO SERVER
      # =========================
      - name: Upload JARs to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "jars/*.jar"
          target: "/opt/microservices/"

      # =========================
      # DEPLOY SEQUENTIALLY
      # =========================
      - name: Deploy Services (Ordered + Safe)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            echo "🚀 Starting Deployment..."

            declare -A PORTS
            PORTS["eureka-client"]=8761
            PORTS["auth-service"]=8081
            PORTS["gateway-service"]=8080
            PORTS["setting-service"]=8082
            PORTS["user-service"]=8083

            SERVICES=(
              "eureka-client"
              "auth-service"
              "gateway-service"
              "setting-service"
              "user-service"
            )

            for SERVICE in "${SERVICES[@]}"
            do
              echo "===================================="
              echo "Deploying $SERVICE"
              echo "===================================="

              DIR=/opt/microservices/$SERVICE
              mkdir -p $DIR

              cd /opt/microservices

              # Find correct jar
              JAR=$(ls *.jar | grep $SERVICE | head -n 1)

              if [ -z "$JAR" ]; then
                echo "⚠ No new JAR found for $SERVICE, skipping..."
                continue
              fi

              # Move jar to service directory
              mv $JAR $DIR/app.jar

              cd $DIR

              # Backup previous version
              if [ -f app.jar ]; then
                cp app.jar app.jar.bak
              fi

              # Start or reload via PM2
              pm2 describe $SERVICE > /dev/null 2>&1

              if [ $? -eq 0 ]; then
                pm2 reload $SERVICE
              else
                pm2 start app.jar --name $SERVICE --interpreter java --interpreter-args "-jar"
              fi

              sleep 8

              PORT=${PORTS[$SERVICE]}

              echo "🔍 Checking health on port $PORT"

              curl -f http://localhost:$PORT/actuator/health > /dev/null 2>&1

              if [ $? -ne 0 ]; then
                echo "❌ Health check failed for $SERVICE"

                if [ -f app.jar.bak ]; then
                  echo "↩ Rolling back..."
                  mv app.jar.bak app.jar
                  pm2 restart $SERVICE
                fi

                exit 1
              fi

              echo "✅ $SERVICE deployed successfully"
            done

            echo "🎉 All services deployed successfully!"
