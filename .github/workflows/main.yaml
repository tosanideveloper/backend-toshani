name: Toshani CICD Pipeline

on:
  push:
    branches:
      - develop

  workflow_dispatch:
    inputs:
      service:
        description: Select service to deploy
        required: true
        type: choice
        options:
          - eureka-client
          - auth-service
          - gateway-service
          - setting-service
          - user-service

jobs:

  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build
        run: |
          cd parent-pom
          mvn clean install -DskipTests

      - name: Collect jars
        run: |
          mkdir artifacts
          cp auth-service/target/*.jar artifacts/ || true
          cp eureka-client/target/*.jar artifacts/ || true
          cp gateway-service/target/*.jar artifacts/ || true
          cp setting-service/target/*.jar artifacts/ || true
          cp user-service/target/*.jar artifacts/ || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jars
          path: artifacts/*.jar


  deploy:
  runs-on: ubuntu-latest
  if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
  needs: build

  steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: jars
        path: artifacts

    # Upload to TEMP (IMPORTANT)
    - name: Upload jars to EC2 (temp)
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        source: artifacts/*.jar
        target: /tmp/deploy/

    - name: Deploy selected service
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |

          # =========================
          # HANDLE SERVICE INPUT
          # =========================
          SERVICE="${{ github.event.inputs.service }}"

          # If push event (no input), skip deploy safely
          if [ -z "$SERVICE" ]; then
            echo "No service selected (push event). Skipping deployment."
            exit 0
          fi

          echo "Deploying $SERVICE"

          BASE_DIR="/var/www/toshanidev"
          SERVICE_DIR="$BASE_DIR/$SERVICE"
          TMP_DIR="/tmp/deploy"

          TIMESTAMP=$(date +%Y%m%d_%H%M%S)

          mkdir -p "$SERVICE_DIR"

          # =========================
          # FIND NEW JAR
          # =========================
          cd "$TMP_DIR"
          JAR=$(ls -t *.jar | grep "$SERVICE" | head -n 1)

          if [ -z "$JAR" ]; then
            echo "❌ No JAR found for $SERVICE"
            exit 1
          fi

          # =========================
          # BACKUP EXISTING JAR
          # =========================
          cd "$SERVICE_DIR"

          if [ -f app.jar ]; then
            BACKUP_DIR="$SERVICE_DIR/backup_$TIMESTAMP"
            mkdir -p "$BACKUP_DIR"

            echo "Taking backup: $BACKUP_DIR"
            cp app.jar "$BACKUP_DIR/"
          fi

          # =========================
          # REPLACE JAR
          # =========================
          cd "$TMP_DIR"
          mv "$JAR" "$SERVICE_DIR/app.jar"

          cd "$SERVICE_DIR"

          echo "New JAR deployed"

          # =========================
          # PM2 RELOAD (ONLY THIS SERVICE)
          # =========================
          pm2 describe "$SERVICE" > /dev/null 2>&1

          if [ $? -eq 0 ]; then
            pm2 reload "$SERVICE"
          else
            pm2 start "java -jar app.jar" --name "$SERVICE"
          fi

          echo "PM2 reload done"

          # =========================
          # CLEAN TEMP
          # =========================
          rm -f $TMP_DIR/*.jar

          echo "✅ Deployment completed"
