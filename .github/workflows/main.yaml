name: Toshani CICD Pipeline

on:
  push:
    branches:
      - develop

  workflow_dispatch:
    inputs:
      service:
        description: Select service to deploy
        required: true
        type: choice
        options:
          - eureka-client
          - auth-service
          - gateway-service
          - setting-service
          - user-service

jobs:

  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build
        run: |
          cd parent-pom
          mvn clean install -DskipTests

      - name: Collect jars
        run: |
          mkdir artifacts
          cp auth-service/target/*.jar artifacts/ || true
          cp eureka-client/target/*.jar artifacts/ || true
          cp gateway-service/target/*.jar artifacts/ || true
          cp setting-service/target/*.jar artifacts/ || true
          cp user-service/target/*.jar artifacts/ || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jars
          path: artifacts/*.jar


  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: jars
          path: artifacts

      - name: Upload jars to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: artifacts/*.jar
          target: /opt/microservices/

      - name: Deploy selected service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            SERVICE="${{ github.event.inputs.service }}"

            echo "Deploying $SERVICE"

            DIR="/opt/microservices/$SERVICE"
            mkdir -p "$DIR"

            cd /opt/microservices
            JAR=$(ls -t *.jar | grep "$SERVICE" | head -n 1)

            if [ -z "$JAR" ]; then
              echo "No jar found"
              exit 1
            fi

            cd "$DIR"
            if [ -f app.jar ]; then
              cp app.jar app.jar.bak
            fi

            cd /opt/microservices
            mv "$JAR" "$DIR/app.jar"

            cd "$DIR"

            pm2 describe "$SERVICE" > /dev/null 2>&1
            if [ $? -eq 0 ]; then
              pm2 reload "$SERVICE"
            else
              pm2 start "java -jar app.jar" --name "$SERVICE"
            fi

            echo "Done"
