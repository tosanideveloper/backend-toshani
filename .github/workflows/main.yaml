name: Toshani CICD Pipeline

on:
  push:
    branches:
      - develop

  workflow_dispatch:
    inputs:
      service:
        description: "Select service to deploy"
        required: true
        type: choice
        options:
          - eureka-client
          - auth-service
          - gateway-service
          - setting-service
          - user-service

jobs:

  # =========================
  # BUILD JOB
  # =========================
  build:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build All Modules
        run: |
          cd parent-pom
          mvn clean install -DskipTests

      - name: Collect JARs
        run: |
          mkdir artifacts
          cp auth-service/target/*.jar artifacts/ || true
          cp eureka-client/target/*.jar artifacts/ || true
          cp gateway-service/target/*.jar artifacts/ || true
          cp setting-service/target/*.jar artifacts/ || true
          cp user-service/target/*.jar artifacts/ || true
          ls -lh artifacts

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: microservices-jars
          path: artifacts/*.jar


  # =========================
  # DEPLOY JOB (MANUAL)
  # =========================
  deploy:
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: microservices-jars
          path: artifacts

      - name: Show Selected Service
        run: echo "Deploying service: ${{ github.event.inputs.service }}"

      - name: Upload JARs to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: artifacts/*.jar
          target: /opt/microservices/

      - name: Deploy Selected Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            SERVICE="${{ github.event.inputs.service }}"

            echo "Deploying $SERVICE"

            declare -A PORTS
            PORTS["eureka-client"]=8761
            PORTS["auth-service"]=8081
            PORTS["gateway-service"]=8080
            PORTS["setting-service"]=8082
            PORTS["user-service"]=8083

            DIR="/opt/microservices/$SERVICE"
            mkdir -p "$DIR"

            cd /opt/microservices

            JAR=$(ls -t *.jar | grep "$SERVICE" | head -n 1)

            if [ -z "$JAR" ]; then
              echo "No JAR found for $SERVICE"
              exit 1
            fi

            cd "$DIR"
            if [ -f app.jar ]; then
              cp app.jar app.jar.bak
            fi

            cd /opt/microservices
            mv "$JAR" "$DIR/app.jar"

            cd "$DIR"

            pm2 describe "$SERVICE" > /dev/null 2>&1

            if [ $? -eq 0 ]; then
              pm2 reload "$SERVICE"
            else
              pm2 start "java -jar app.jar" --name "$SERVICE"
            fi

            PORT=${PORTS[$SERVICE]}

            echo "Checking health on port $PORT"

            for i in 1 2 3 4 5
            do
              curl -f http://localhost:$PORT/actuator/health > /dev/null 2>&1 && break
              echo "Waiting... attempt $i"
              sleep 5
            done

            curl -f http://localhost:$PORT/actuator/health > /dev/null 2>&1

            if [ $? -ne 0 ]; then
              echo "Health check failed"

              if [ -f app.jar.bak ]; then
                mv app.jar.bak app.jar
                pm2 restart "$SERVICE"
              fi

              exit 1
            fi

            echo "$SERVICE deployed successfully"
